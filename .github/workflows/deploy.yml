name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: web17736.web11.mynet.at
          username: web17736
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: /httpdocs/wp-content/plugins/oemm-backend-xxvi/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
