# ============================================================
# ÖMM XXVI Fotobox — Konfiguration
# ============================================================
# Diese Datei muss im selben Verzeichnis wie oemm_fotobox.py liegen.
# Nach dem Ausfüllen einfach das Script starten.

[api]
# API-Endpunkt (nicht ändern)
url = https://mopedmarathon.at/wp-json/oemm-xxvi/v1/foto/upload

# !! API Key hier eintragen !!
key = c0bb5c663d4c39dfbc6dc6e4c769bb4ab777548f51afef8a

# Timeout für Upload (Sekunden)
timeout_sec = 30

# Wiederholungsversuche bei Fehler
retry_count = 3


[camera]
# Kamera-Backend:
#   opencv     = USB-Kamera oder integrierte Webcam (Standard)
#   libcamera  = Raspberry Pi Kameramodul (ribbon cable)
#   fswebcam   = einfache USB-Kamera (minimale Abhängigkeiten)
backend = opencv

# Kamera-Index (0 = erste Kamera, 1 = zweite, ...)
index = 0

# Auflösung
resolution = 1920x1080

# Verzeichnis für Fotos
foto_dir = /tmp/oemm_fotos

# Countdown vor Foto (Sekunden, 0 = sofort)
countdown_sec = 3

# Kamera-Aufwärmzeit (Sekunden) — für automatische Belichtung
warmup_sec = 1.5


[qr]
# Entprellzeit: gleicher QR-Code wird für diese Zeit ignoriert (Sekunden)
debounce_sec = 5.0

# Mindestlänge für gültige Token
min_token_len = 8

# Optional: nur QR-Codes mit diesem Prefix akzeptieren (leer = alle)
token_prefix =


[queue]
# Datei für Offline-Queue
file = /tmp/oemm_queue.json

# Maximale Dateigröße pro Foto (MB)
max_file_mb = 25


[gpio]
# GPIO-Pins für LED-Feedback (BCM-Nummerierung)
# Grün  = Upload OK
# Rot   = Fehler
# Gelb  = Offline gespeichert
pin_green  = 17
pin_red    = 27
pin_yellow = 22


[sound]
# Optionale Sound-Effekte (Pfad zu WAV-Dateien, leer = kein Sound)
ok      =
error   =
shutter =
