[fotobox]
# WordPress API URL
api_url = https://mopedmarathon.at/wp-json/oemm-xxvi/v1/foto/upload

# API Key (aus WP Admin -> ÖMM XXVI -> Einstellungen -> Fotobox API Key)
api_key = HIER_API_KEY_EINTRAGEN

# Offline-Queue Datei (bei Verbindungsausfall)
queue_file = /tmp/oemm_queue.json

# Maximale Dateigrösse in MB
max_file_mb = 25

# Timeout in Sekunden pro Upload-Versuch
timeout_sec = 30

# Anzahl Wiederholungsversuche bei Fehler
retry_count = 3
